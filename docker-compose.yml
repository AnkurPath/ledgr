services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledgr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ledgr"]
      interval: 5s
      timeout: 5s
      retries: 10
  
