replicaCount: 1

image:
  repository: ghcr.io/ankur/ledgr
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

resources: {}

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

env:
  LEDGR_ENV: "production"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "30"

# Sensitive values. Override these at install time (e.g. --set-string) or via an
# existing secret. Do NOT commit real credentials here. With LEDGR_ENV=production
# the app refuses to start unless LEDGR_JWT_SECRET_KEY and LEDGR_DATABASE_URL are set.
secretEnv:
  LEDGR_JWT_SECRET_KEY: ""
  LEDGR_DATABASE_URL: ""

createSecret: true
existingSecretName: ""

livenessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 20
  periodSeconds: 20

readinessProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10
