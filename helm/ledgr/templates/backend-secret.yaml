{{- if and .Values.backend.enabled .Values.backend.createSecret (not .Values.backend.existingSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ledgr.backend.fullname" . }}-env
  labels:
    {{- include "ledgr.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  {{- range $key, $value := .Values.backend.secretEnv }}
  {{- /* When CNPG is enabled, DB URL comes from the operator secret — skip any override. */}}
  {{- if or (ne $key "LEDGR_DATABASE_URL") (not $.Values.cnpg.enabled) }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
